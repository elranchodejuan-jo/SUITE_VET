name: Deploy Suite Vet to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Reject invalid public Supabase build configuration
        if: ${{ vars.VITE_SUPABASE_URL == '' || vars.VITE_SUPABASE_PUBLISHABLE_KEY == '' || !startsWith(vars.VITE_SUPABASE_URL, 'https://') || !endsWith(vars.VITE_SUPABASE_URL, '.supabase.co') || startsWith(vars.VITE_SUPABASE_PUBLISHABLE_KEY, 'sb_secret_') || startsWith(vars.VITE_SUPABASE_PUBLISHABLE_KEY, 'eyJ') || startsWith(vars.VITE_SUPABASE_PUBLISHABLE_KEY, 'example') || startsWith(vars.VITE_SUPABASE_PUBLISHABLE_KEY, 'placeholder') || startsWith(vars.VITE_SUPABASE_PUBLISHABLE_KEY, 'your_') }}
        run: |
          echo "Public Supabase build variables are missing, invalid or unsafe."
          exit 1

      - name: Run tests
        run: npm test

      - name: Build production artifact
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
